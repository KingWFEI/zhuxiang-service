      type: object
      description: 租金筛选区间
      properties:
        label:
          type: string
          description: 选项显示名称
        maxPrice:
          type: integer
          format: int32
          description: 最高月租金，单位元
        minPrice:
          type: integer
          format: int32
          description: 最低月租金，单位元
    RealNameRequest:
      type: object
      description: 订单实名认证请求
      properties:
        idCardBackUrl:
          type: string
          description: 身份证国徽面图片 URL
          example: /api/uploads/id-card-back.jpg
          minLength: 1
        idCardFrontUrl:
          type: string
          description: 身份证人像面图片 URL
          example: /api/uploads/id-card-front.jpg
          minLength: 1
        tenantIdCard:
          type: string
          description: 18 位居民身份证号
          example: "510100199001011234"
          minLength: 1
          pattern: "^\\d{17}[\\dXx]$"
        tenantName:
          type: string
          description: 租客真实姓名
          example: 张三
          maxLength: 30
          minLength: 1
        tenantPhone:
          type: string
          description: 租客联系电话
          example: "13800138000"
          minLength: 1
          pattern: "^1\\d{10}$"
      required:
      - idCardBackUrl
      - idCardFrontUrl
      - tenantIdCard
      - tenantName
      - tenantPhone
    RefreshRequest:
      type: object
      description: 令牌刷新请求
      properties:
        refreshToken:
          type: string
          description: 登录或上次刷新时签发的刷新令牌
          minLength: 1
      required:
      - refreshToken
    RegisterRequest:
