spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: zhuxiang-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: ${DB_URL:jdbc:mysql://localhost:3306/zhuxiang_app?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
#    username:   ${DB_USERNAME:root}
#    password: ${DB_PASSWORD:wf010931}
    url: ${DB_URL:jdbc:mysql://10.143.183.205:3306/zhuxiang_app?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:zhuxiang_app_user}
    password: ${DB_PASSWORD:Zhuxiang@2026!}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8000}
  servlet:
    context-path: ${API_PREFIX:/api}

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.zhuxiang.service.controller
  writer-with-order-by-keys: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhuxiang.service.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

app:
  auth:
    access-token-seconds: ${ACCESS_TOKEN_SECONDS:7200}
    refresh-token-days: ${REFRESH_TOKEN_DAYS:30}
    token-secret: ${TOKEN_SECRET:change-this-secret-in-production}
    fixed-sms-code: ${FIXED_SMS_CODE:123456}
  upload:
    directory: ${UPLOAD_DIRECTORY:./uploads}
  storage:
    type: ${STORAGE_TYPE:cos}
    cos:
      secret-id: ${TENCENT_COS_SECRET_ID:}
      secret-key: ${TENCENT_COS_SECRET_KEY:}
      session-token: ${TENCENT_COS_SESSION_TOKEN:}
      region: ${TENCENT_COS_REGION:}
      bucket: ${TENCENT_COS_BUCKET:}
      public-base-url: ${TENCENT_COS_PUBLIC_BASE_URL:}
      key-prefix: ${TENCENT_COS_KEY_PREFIX:zhuxiang}
  lock-passcode:
    encryption-key: ${LOCK_PASSCODE_ENCRYPTION_KEY:}
    key-version: ${LOCK_PASSCODE_KEY_VERSION:1}
    query-limit-per-minute: ${LOCK_PASSCODE_QUERY_LIMIT_PER_MINUTE:10}
    expiration-scan-ms: ${LOCK_PASSCODE_EXPIRATION_SCAN_MS:300000}
  super-admin:
    enabled: ${SUPER_ADMIN_ENABLED:true}
    phone: ${SUPER_ADMIN_PHONE:13800000000}
    password: ${SUPER_ADMIN_PASSWORD:admin123}
    nickname: ${SUPER_ADMIN_NICKNAME:超级管理员}

ttlock:
  client-id: ${TTLOCK_CLIENT_ID:cb5534587e624eb59a9244cc14b8e281}
  client-secret: ${TTLOCK_CLIENT_SECRET:b73051c1d61c6c3aa7a5bb4917a495e8}
  username: ${TTLOCK_USERNAME:15282398801}
  password: ${TTLOCK_PASSWORD:wf010931}
  access-token: ${TTLOCK_ACCESS_TOKEN:}
  base-url: ${TTLOCK_BASE_URL:https://api.sciener.com}
