          example: 张三
          maxLength: 30
          minLength: 1
        contactPhone:
          type: string
          description: 联系人手机号
          example: "13800138000"
          minLength: 1
          pattern: "^1\\d{10}$"
        houseId:
          type: string
          description: 预约房源 ID
          example: house_001
          minLength: 1
