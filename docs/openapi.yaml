          example: "13800138000"
          minLength: 1
          pattern: "^1\\d{10}$"
        scene:
          type: string
          description: 验证码用途
          enum:
          - login
          - register
          - reset_password
          - real_name
          example: login
          minLength: 1
          pattern: login|register|reset_password|real_name
      required:
      - phone
      - scene
