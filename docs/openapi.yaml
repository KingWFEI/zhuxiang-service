          type: string
          description: 预约备注，最多 500 字
          example: 希望提前电话联系
          maxLength: 500
          minLength: 0
        timeSlot:
          type: string
          description: 预约时间段，格式 HH:mm-HH:mm
          example: 09:00-11:00
          minLength: 1
          pattern: "^\\d{2}:\\d{2}-\\d{2}:\\d{2}$"
