spring:
  application:
    name: zhuxiang-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/zhuxiang_app?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username:   ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

server:
  port: ${SERVER_PORT:8000}
  servlet:
    context-path: ${API_PREFIX:/api}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhuxiang.infrastructure.persistence.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id