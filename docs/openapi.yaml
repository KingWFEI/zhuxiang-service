          example: Example123
          maxLength: 32
          minLength: 6
        phone:
          type: string
          description: 注册手机号
          example: "13800138000"
          minLength: 1
          pattern: "^1\\d{10}$"
      required:
      - code
      - nickname
      - password
      - phone
