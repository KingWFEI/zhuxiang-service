openapi: 3.1.0
info:
  contact:
    name: 筑享开发团队
  description: 筑享移动端和管理端后端接口。除明确标注为公开接口外，受保护接口需在 Authorization 请求头中携带 Bearer 访问令牌。
  license:
    name: 内部使用
  title: 筑享租房平台接口文档
  version: v1
servers:
- description: Generated server url
  url: http://localhost:18080/api
tags:
- description: 当前用户站内消息查询、已读和删除操作
  name: 消息
- description: 当前用户租约及关联门锁查询
  name: 租约
- description: 公开房东资料查询
  name: 房东
- description: 房源流、条件搜索、详情和收藏
  name: 房源
- description: 管理端创建和查询房源
  name: 管理端房源
- description: 租房订单创建、实名、合同确认、支付和签约流程
  name: 租房订单
- description: 移动端首页聚合数据
  name: 首页
- description: 当前用户资料、安全设置、头像、住所、门锁和收藏
  name: 个人中心
- description: 用户预约看房和创建房源咨询会话
  name: 预约与咨询
- description: 租房订单支付回调
  name: 支付
- description: 管理端用户登录、注册、令牌刷新和退出登录
  name: 管理端认证
- description: 移动端短信验证码、登录、注册、令牌刷新和退出登录
  name: 用户认证
- description: 智能门锁录入、绑定、平台同步、状态查询和蓝牙开锁数据
  name: 管理端门锁
- description: 业务文件上传
  name: 文件
paths:
  /admin/auth/login:
    post:
      description: 使用手机号和密码登录，仅允许管理员、管家或房东角色。
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordLoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAuthResult"
          description: 请求成功
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
          description: 请求参数错误或业务校验失败
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
          description: 请求的业务资源不存在
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
          description: 资源状态冲突，无法完成当前操作
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
          description: 服务器内部错误
      summary: 管理端登录
      tags:
      - 管理端认证
  /admin/auth/logout:
    post:
      description: 注销当前用户提交的刷新令牌。
