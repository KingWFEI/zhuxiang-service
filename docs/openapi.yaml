          example: 20
        total:
          type: integer
          format: int64
          description: 总记录数
          example: 42
    PageDataMessageView:
      type: object
      description: 分页数据
      properties:
        hasMore:
          type: boolean
          description: 是否还有下一页
          example: true
        items:
          type: array
          description: 当前页数据
          items:
            $ref: "#/components/schemas/MessageView"
        page:
          type: integer
          format: int64
          description: 当前页码，从 1 开始
          example: 1
        pageSize:
          type: integer
          format: int64
          description: 每页条数
          example: 20
        total:
          type: integer
          format: int64
          description: 总记录数
          example: 42
    PasswordLoginRequest:
      type: object
      description: 账号密码登录请求
      properties:
        password:
          type: string
          description: 登录密码
          example: Example123
          minLength: 1
        phone:
          type: string
          description: 登录手机号
          example: "13800138000"
          minLength: 1
          pattern: "^1\\d{10}$"
      required:
      - password
      - phone
    PayRequest:
      type: object
      description: 租房订单支付请求
      properties:
        paymentChannel:
          type: string
          description: 支付渠道；不传时默认为 mock
          example: mock
        paymentMethod:
          type: string
          description: 订单付款方式，需与订单约定一致
          example: 押一付三
          minLength: 1
      required:
      - paymentMethod
    PaymentInfoResponse:
      type: object
      description: 订单支付信息
      properties:
        deposit:
          type: integer
          format: int32
          description: 押金，单位元
        firstPaymentAmount:
          type: integer
          format: int32
          description: 首期应付金额，单位元
        monthlyRent:
          type: integer
          format: int32
          description: 月租金，单位元
        orderId:
          type: string
          description: 租房订单 ID
        paymentMethod:
          type: string
          description: 租金付款方式
        paymentMonths:
          type: integer
          format: int32
          description: 每期支付月数
        serviceFee:
          type: integer
          format: int32
          description: 服务费，单位元
        status:
          type: string
          description: 业务状态
